<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>md-quiz demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { loadQuiz } from './md-quiz.js';

    const app = document.getElementById('app');
    const quiz = await loadQuiz('./quiz.md', app, {
      submitLabel: '回答する',
      autoDisableSubmit: true,
    });

    app.addEventListener('mq-answer', (e) => {
      if (e.detail.correct || e.detail.answers.length === 0) return;

      const questionEl = app.querySelector(`[data-index="${e.detail.index}"]`);
      if (!questionEl || questionEl.querySelector('.quiz-answer')) return;

      const answer = document.createElement('p');
      answer.className = 'quiz-answer';
      answer.textContent = `正解: ${e.detail.answers.join(' / ')}`;
      questionEl.appendChild(answer);
    });

    app.addEventListener('mq-complete', (e) => {
      const banner = document.createElement('div');
      banner.style.cssText = `
        margin-top: 1.5rem; padding: 1.25rem 1.5rem;
        background: #eef2ff; border: 1.5px solid #818cf8;
        border-radius: 12px; text-align: center;
        font-weight: 700; font-size: 1.125rem; color: #4338ca;
      `;
      banner.textContent = `クイズ完了！ 全 ${e.detail.total} 問に回答しました`;
      app.appendChild(banner);
    });
  </script>
</body>
</html>
